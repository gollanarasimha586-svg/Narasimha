<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Record</title>
    <link rel="stylesheet" href="11(1).CSS">
</head>

<body>

<h2>Student Details</h2>

<div class="form-box">

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="dept" placeholder="Department">
<input type="number" step="0.01" id="cgpa" placeholder="CGPA">
<input type="text" id="mobile" placeholder="Mobile Number">

<button onclick="addStudent()">Add Student</button>

</div>

<table id="studentTable">

<thead>
<tr>
<th>Full Name</th>
<th>Department</th>
<th>CGPA</th>
<th>Mobile Number</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

<script src="11(1).script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head
    <link rel="stylesheet" href="4F8.CSS">
<title>Register Form</title>
<style>
body{
    font-family: Arial;
}
.container{
    width:300px;
    border:2px solid black;
    padding:15px;
}
label{
    display:block;
    margin-top:10px;
}
input, select, button{
    width:100%;
    padding:5px;
    margin-top:5px;
    <background:display:green 9, 201,rgb(3 72);
;
}
</style>
</head>

<body>

<div class="container">
<h3>Register form</h3>

<form>

<label>First name:</label>
<input type="text" name="firstname">

<label>Last name:</label>
<input type="text" name="lastname">

<label>Email:</label>
<input type="email" name="email">

<label>Password:</label>
<input type="password" name="password">

<label>Retype password:</label>
<input type="password" name="repassword">

<label>Contact:</label>
<input type="tel" name="contact">

<label>Gender:</label>
<select name="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<button type="submit">Select</button>

              
 

</form>
</div>

</body>
</html>
